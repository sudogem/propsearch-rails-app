# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem "sqlite3"
#
default: &default
  # adapter: sqlite3
  # pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  # timeout: 5000
  # adapter: <%= ENV['DATABASE_ADAPTER'] || 'postgresql' %>
  # encoding: utf8
  # pool: 5
  # username: <%= ENV['DATABASE_USER'] || 'postgres' %>
  # password: <%= ENV['DATABASE_PASSWORD'] || 'password' %>
  # host: <%= ENV['DATABASE_HOST'] || 'localhost' %>
  # url: 'postgresql://neondb_owner:abc_DEFGHIJKLMNO@ep-curly-heart-amafoi1j-pooler.c-5.us-east-1.aws.neon.tech/landchecker_db?sslmode=require&channel_binding=require'
  url: <%= ENV['DATABASE_URL'] %>

development:
  <<: *default
  # database: storage/landchecker_development.sqlite3
  database: <%= ENV['DATABASE'] || 'landchecker_development' %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  # database: storage/landchecker_test.sqlite3
  database: <%= ENV['DATABASE_TEST'] || 'landchecker_test' %>

# SQLite3 write its data on the local filesystem, as such it requires
# persistent disks. If you are deploying to a managed service, you should
# make sure it provides disk persistence, as many don't.
#
# Similarly, if you deploy your application as a Docker container, you must
# ensure the database is located in a persisted volume.
production:
  <<: *default
  # database: path/to/persistent/storage/production.sqlite3
  url: <%= ENV['DATABASE_URL'] %>
